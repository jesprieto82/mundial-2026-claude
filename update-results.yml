name: Actualizar resultados (API-Football)

on:
  schedule:
    # Ventana 12:00–01:00 de Cancún (UTC-5) = 17:00–06:00 UTC. Cada 10 minutos.
    - cron: "*/10 17-23 * * *"   # 12:00–18:59 Cancún
    - cron: "*/10 0-5 * * *"     # 19:00–00:59 Cancún
    - cron: "0 6 * * *"          # 01:00 Cancún (cierre de la ventana)
  workflow_dispatch:            # botón para ejecutarlo manualmente cuando quieras

permissions:
  contents: write

# Evita que dos ejecuciones se pisen
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Obtener resultados y escribir results.json
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-results.js

      - name: Hacer commit si hubo cambios
        run: |
          if [ -n "$(git status --porcelain results.json)" ]; then
            git config user.name "wc2026-bot"
            git config user.email "actions@users.noreply.github.com"
            git add results.json
            git commit -m "Actualización automática de resultados"
            git push
          else
            echo "Sin cambios en results.json"
          fi
